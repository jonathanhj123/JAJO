<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Your Queue — Jukebox</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
        }
      }
    }
  </script>
</head>
<body class="bg-[#0d0d0d] text-white font-sans min-h-screen antialiased">
  <div class="max-w-[1024px] mx-auto min-h-screen flex flex-col">

    <!-- Top bar -->
    <header class="flex items-center justify-between h-14 px-4 shrink-0">
      <a href="search.html" class="w-11 h-11 flex items-center justify-center rounded-full text-white active:bg-zinc-800 transition-colors" aria-label="Back">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </a>
      <span class="text-[17px] font-semibold">Your Queue</span>
      <div class="w-11 h-11"></div>
    </header>

    <!-- Cart items — renderCart() populates this list -->
    <ul id="cart-list" class="border-t border-zinc-800">
      <!-- populated by renderCart() in cart.js -->
    </ul>

    <!-- Pricing breakdown -->
    <!-- updatePricingSummary() updates #total-label and #total-price -->
    <!-- it also highlights #price-row-bundle when cart has 3 songs -->
    <div class="mx-4 mt-4 border border-zinc-800 rounded-xl overflow-hidden">
      <div class="flex justify-between items-center px-4 py-3 text-sm text-zinc-500 border-b border-zinc-800">
        <span>1 song</span>
        <span>2 kr</span>
      </div>
      <div class="flex justify-between items-center px-4 py-3 text-sm text-zinc-500 border-b border-zinc-800">
        <span>2 songs</span>
        <span>4 kr</span>
      </div>
      <!-- updatePricingSummary() adds highlight classes to this row when cart = 3 -->
      <div id="price-row-bundle" class="flex justify-between items-center px-4 py-3 text-sm text-zinc-500 border-b border-zinc-800">
        <span>3 songs &nbsp;🎉 Best deal</span>
        <span>5 kr</span>
      </div>
      <div class="flex justify-between items-center px-4 py-3 text-[15px] font-bold text-white bg-zinc-900">
        <!-- updatePricingSummary() sets textContent on these spans -->
        <span id="total-label">Total</span>
        <span id="total-price">— kr</span>
      </div>
    </div>

    <!-- Payment buttons -->
    <!-- event listeners for both buttons are set up in cart.js -->
    <div class="px-4 pt-5 pb-8 flex flex-col gap-2.5 mt-auto">

      <button id="btn-mobilepay" class="w-full h-14 rounded-2xl flex flex-col items-center justify-center bg-[#5b2d8e] text-white active:opacity-85 active:scale-[0.98] transition-all">
        <span class="text-[11px] font-normal opacity-75 tracking-wider uppercase">Pay with</span>
        <span class="text-xl font-bold tracking-tight leading-tight">MobilePay</span>
      </button>

      <button id="btn-pay-bar" class="w-full h-14 rounded-2xl border border-zinc-800 text-zinc-400 text-base font-semibold active:border-zinc-500 active:text-white transition-colors">
        Pay at the bar
      </button>

    </div>

  </div>

  <script src="js/data.js"></script>
  <script src="js/cart.js"></script>
</body>
</html>
